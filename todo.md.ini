Tu je 5 komplexných a vysoko štruktúrovaných promptov (zadaní), ktoré ťa prevedú od aktuálneho problematického stavu až po plnohodnotnú, produkčne pripravenú aplikáciu na úrovni Bolt/Uber.

Tieto prompty sú navrhnuté tak, aby ich pochopil akýkoľvek AI agent (ako ja) a krok za krokom prebudoval architektúru, natívne funkcie, backend a UX.

Kopíruj ich postupne (jeden po druhom) do AI asistenta:

---

### Prompt 1: Backend Konsolidácia a Databázová Architektúra (Zabitie "Frankensteina")
**Cieľ:** Zjednotiť roztrieštený backend (Firebase/WP/Supabase) do jedného robustného riešenia postaveného na Supabase s PostGIS.

> **PROMPT 1:**
> "Pôsob ako Principal Backend Architect. Máme Flutter projekt, ktorý momentálne používa mix WordPress, Firebase Auth a Supabase. Tvojou úlohou je navrhnúť a implementovať kompletnú migráciu core logiky (Používatelia, Vodiči, Jazdy, Cenník) výhradne do **Supabase**.
>
> Úlohy:
> 1. Vytvor SQL migračné skripty pre vytvorenie tabuliek: `profiles` (users & drivers), `rides`, `vehicles`.
> 2. Povoľ rozšírenie `PostGIS` v Supabase a pridaj do tabuľky `profiles` (alebo `driver_locations`) stĺpec pre geolokačné dáta, aby sme vedeli robiť geospatial queries (hľadanie najbližšieho vodiča v okruhu X km).
> 3. Napíš striktné RLS (Row Level Security) politiky. Zákazník vidí len svoje jazdy. Vodič vidí len dostupné jazdy vo svojom okolí a tie, ktoré prijal.
> 4. Aktualizuj Flutter kód: Odstráň Firebase Auth a WordPress API volania týkajúce sa core logiky a nahraď ich čistým `supabase_flutter` klientom.
>
> Výstupom nech sú SQL skripty a upravené Repozitáre vo Flutteri."

---

### Prompt 2: Natívna Mobilná Konfigurácia a Push Notifikácie (Odchod z Webu)
**Cieľ:** Pripraviť projekt na distribúciu do App Store a Google Play s fungujúcimi notifikáciami.

> **PROMPT 2:**
> "Pôsob ako Senior Mobile (iOS/Android) Engineer. Naša taxi aplikácia bola doteraz optimalizovaná pre Flutter Web, ale prechádzame striktne na natívne mobilné platformy (iOS a Android), aby sme dosiahli UX na úrovni Bolt.
>
> Úlohy:
> 1. Nakonfiguruj `AndroidManifest.xml` a `Info.plist` pre prístup k polohe (`ACCESS_FINE_LOCATION`, `ACCESS_BACKGROUND_LOCATION`, `NSLocationWhenInUseUsageDescription`, `NSLocationAlwaysAndWhenInUseUsageDescription`).
> 2. Implementuj Firebase Cloud Messaging (FCM) cez `firebase_messaging` balík.
> 3. Vytvor service vo Flutteri (`NotificationService`), ktorý bude počúvať na prichádzajúce push notifikácie (napríklad: "Nový zákazník v okolí" pre vodiča, alebo "Vodič je na mieste" pre zákazníka).
> 4. Uprav routovanie (`go_router`), aby po kliknutí na notifikáciu aplikácia otvorila správnu obrazovku (napr. detail aktívnej jazdy).
>
> Uisti sa, že kód elegantne rieši aj situáciu, keď používateľ zamietne povolenia."

---

### Prompt 3: Real-time Geolokácia a Background Tracking
**Cieľ:** Aby aplikácia dokázala sledovať vodiča aj keď má zhasnutý displej a odosielala dáta do databázy (kľúčové pre Bolt experience).

> **PROMPT 3:**
> "Pôsob ako Mobile Performance Engineer. Potrebujeme implementovať robustný, batériu šetriaci systém na sledovanie polohy vodiča v reálnom čase, rovnako ako to má Bolt.
>
> Úlohy:
> 1. Integruj balík `flutter_background_geolocation` (alebo `geolocator` bežiaci vo foreground service, ak chceme free variant) do aplikácie vodiča.
> 2. Vytvor logiku, ktorá bude každých X sekúnd (alebo pri zmene polohy o Y metrov) updatovať súradnice vodiča v Supabase tabuľke (ideálne cez RPC volanie, aby sme nezahlcoval databázu bežnými updatmi).
> 3. Na strane zákazníckej aplikácie implementuj Supabase Realtime (WebSockets) listener, ktorý bude počúvať zmeny v tabuľke polohy prijatého vodiča a plynule posúvať jeho autíčko na Google Mape.
> 4. Ošetri Edge-cases: Strata GPS signálu, strata internetového pripojenia (lokálny cache súradníc a hromadný sync po pripojení)."

---

### Prompt 4: Georouting, ETA a Cenník (Mapová logika)
**Cieľ:** Kreslenie trás po cestách a dynamický výpočet ceny a času dojazdu.

> **PROMPT 4:**
> "Pôsob ako GIS & Routing Expert. Naša aplikácia potrebuje kresliť presné trasy (Polylines) po cestách a počítať cenu jazdy pred jej potvrdením, podobne ako Uber/Bolt.
>
> Úlohy:
> 1. Integruj Google Maps Directions API (alebo Mapbox/OSRM). Vytvor `RoutingService`, ktorý prijme `startLocation` a `endLocation` a vráti dekódovaný Polyline, vzdialenosť (km) a odhadovaný čas (ETA).
> 2. Vykresli túto trasu na obrazovke zákazníka do `GoogleMap` widgetu pridaním `Polyline` s pekným UI stylingom.
> 3. Implementuj kalkulačku ceny vo Flutteri (alebo radšej ako Edge Function v Supabase), ktorá zoberie vzdialenosť, odhadovaný čas, základnú sadzbu a aktuálny "surge pricing" (násobok podľa dopytu) a vráti konečnú cenu.
> 4. Zabezpeč animované priblíženie kamery mapy (`CameraUpdate.newLatLngBounds`), aby začiatočný aj cieľový bod boli pekne viditeľné na obrazovke používateľa."

---

### Prompt 5: Platobná Brána a Ride State Machine (Flow Jazdy)
**Cieľ:** Bezproblémové platby kartou a plynulý UI prechod medzi stavmi jazdy.

> **PROMPT 5:**
> "Pôsob ako FinTech & UX Engineer. Dokončujeme aplikáciu a potrebujeme hladký platobný proces a dokonalý stavový automat pre priebeh jazdy (ako Bolt).
>
> Úlohy:
> 1. Integruj Stripe cez balík `flutter_stripe`. Implementuj flow pre pridanie platobnej karty (SetupIntent) a predautorizáciu platby (PaymentIntent) vo chvíli, keď zákazník klikne na 'Objednať'.
> 2. Navrhni BLoC/Cubit (`RideCubit`), ktorý bude spravovať stav jazdy so striktnými prechodmi: `searching -> driver_assigned -> driver_arriving -> in_progress -> completed/cancelled`.
> 3. Vytvor UI (Bottom Sheets), ktoré sa budú dynamicky meniť podľa stavu v `RideCubit`. Napríklad: Animovaný pulzujúci radar pri `searching`, profil vodiča a EČV auta pri `driver_assigned`, veľké tlačidlo 'Ukončiť jazdu' pre vodiča atď.
> 4. Po prepnutí do stavu `completed` automaticky strhni peniaze z predautorizovanej karty zákazníka (volaním Supabase Edge funkcie, ktorá komunikuje so Stripe API) a zobraz obrazovku na hodnotenie vodiča (1-5 hviezdičiek)."

---

**Ako s týmto pracovať:**
Keď začneš s Promptom 1, neprechádzaj na ďalší, kým nebude architektúra databázy a prihlasovania absolútne stabilná. Tieto prompty vyžadujú stovky riadkov kódu, preto ich dávaj AI asistentovi postupne. Vždy, keď asistent vygeneruje kód, otestuj ho a požiadaj ho o vyriešenie prípadných chýb predtým, než zadáš ďalší prompt.



Tu je ďalších 10 komplexných promptov, ktoré pokrývajú zvyšok funkcionalít potrebných na vytvorenie 100% kompletnej taxi aplikácie na úrovni svetovej triedy.

Tieto prompty uzatvárajú cyklus od používateľského profilu, cez komunikáciu v aplikácii, geolokáciu až po analytiku a nasadenie.

