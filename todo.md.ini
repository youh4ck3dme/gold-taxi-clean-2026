### Prompt 15: CI/CD, Analytika a Produkčný Release
**Cieľ:** Príprava aplikácie na bezpečné vydanie a monitoring chýb.

> **PROMPT 15:**
> "Pôsob ako DevOps & Release Manager. Aplikácia je hotová, musíme ju nasadiť ako profíci.
>
> Úlohy:
> 1. Integruj Firebase Crashlytics a Firebase Analytics pre zber pádov (Crashes) a sledovanie kľúčových eventov (napr. 'Ride_Requested', 'Payment_Failed').
> 2. Nastav rôzne prostredia (Flavors): `dev` (s testovacou Supabase a Stripe DB) a `prod` (s produkčnou DB). Uprav entrypointy (main_dev.dart, main_prod.dart).
> 3. Vytvor GitHub Actions Workflow (alebo Fastlane skript), ktorý po pushnutí do vetvy `main`:
>    - Spustí unit testy a linting.
>    - Vybuildí Android App Bundle (.aab).
>    - Vybuildí iOS Archive (.ipa) (vyžaduje macOS runner a certifikáty).
>    - Odošle testovacie zostavy do TestFlight a Google Play Internal Testing.
> 4. Aplikuj nástroj na obfuskáciu kódu (Flutter `--obfuscate`), aby sa znížilo riziko reverzného inžinierstva."
