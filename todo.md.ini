### Prompt 14: Dispečerský / Admin Dashboard (Web)
**Cieľ:** Nástroj pre podporu a riadenie flotily (tzv. Boh-mód).

> **PROMPT 14:**
> "Pôsob ako Full-Stack Architect pre interné nástroje. Potrebujeme webový dispečing pre administrátorov (tu môžeme ponechať Flutter Web).
>
> Úlohy:
> 1. Vytvor oddelený modul/stránku, kam sa dostane len rola `admin` alebo `dispatcher`.
> 2. Na obrazovke musí byť veľká "Živá Mapa", kde cez Supabase Realtime vidíme VŠETKÝCH aktívnych vodičov aj VŠETKY prebiehajúce jazdy s ich stavmi.
> 3. Implementuj funkciu 'Manuálny dispečing' – možnosť vytvoriť jazdu v mene zákazníka, ktorý zavolá telefonicky (tzv. telefonická objednávka) a natvrdo ju prideliť konkrétnemu vodičovi.
> 4. Vytvor tabuľky/zoznamy na rýchle filtrovanie problémových jázd (zrušené zákazníkom po príchode vodiča, reklamácie) a tlačidlo na Refundáciu platieb v Stripe."

