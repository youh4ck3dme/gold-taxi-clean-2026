### Prompt 9: Dynamický Cenník (Surge Pricing) a Geofencing
**Cieľ:** Zarábať viac, keď je dopyt vysoký, a obmedziť prevádzku len na povolené zóny.

> **PROMPT 9:**
> "Pôsob ako Data Scientist & Backend Engineer. Potrebujeme logiku pre zóny a cenotvorbu.
>
> Úlohy:
> 1. V Supabase s PostGIS vytvor tabuľku `operating_zones` (typ Polygon).
> 2. Pred objednaním jazdy skontroluj, či sa štartovací bod nachádza v povolenej zóne (pomocou `ST_Contains`). Ak nie, vyhoď používateľovi pekný error ('V tejto oblasti zatiaľ nejazdíme').
> 3. Vytvor logiku pre 'Surge Pricing' (Násobič ceny). Supabase Edge Function by mala zistiť pomer 'Počet aktívnych dopytov v zóne' vs 'Počet voľných vodičov v zóne'. Ak je áut málo, násobič je napr. 1.5x.
> 4. Zobraz tento násobič vizuálne v aplikácii zákazníka predtým, než jazdu potvrdí (napr. blesk alebo text 'Zvýšený dopyt')."

---

### Prompt 10: Onboarding, KYC a Verifikácia Vodičov
**Cieľ:** Registrácia vodiča musí spĺňať legislatívne podmienky a umožniť upload dokumentov.

> **PROMPT 10:**
> "Pôsob ako Onboarding & Security Specialist. Potrebujeme plnohodnotný flow pre registráciu a schvaľovanie nových vodičov.
>
> Úlohy:
> 1. Vytvor Flutter flow pre vodiča: Nahranie profilovej fotky, fotky občianskeho preukazu a fotky technického preukazu/taxikárskej licencie.
> 2. Na ukladanie obrázkov použi Supabase Storage (s reštrikciami na formát a veľkosť). Odkazy ulož do tabuľky `driver_documents`.
> 3. Implementuj stavy vodiča: `pending_verification`, `active`, `suspended`. Vodič v stave 'pending' sa môže prihlásiť, ale nemôže prijímať jazdy (ukáž mu obrazovku 'Dokumenty sa kontrolujú').
> 4. Pridaj SMS verifikáciu telefónneho čísla (napr. cez Supabase Auth OTP) pre zákazníkov aj vodičov."

---

### Prompt 11: Systém Hodnotení (Ratings) a Sankcie
**Cieľ:** Udržať kvalitu služby.

> **PROMPT 11:**
> "Pôsob ako Quality Assurance Architect. Potrebujeme systém spätnej väzby po jazde.
>
> Úlohy:
> 1. Vytvor Supabase tabuľku `reviews` (od koho, komu, počet hviezdičiek, text, tagy ako 'Čisté auto', 'Príjemný rozhovor').
> 2. Akonáhle sa jazda ukončí, zobraz zákazníkovi obrazovku s 5 hviezdičkami a možnosťou nechať tringelt (Tip) cez Stripe.
> 3. Implementuj databázový Trigger (alebo cron job), ktorý po každom novom hodnotení prepočíta celkový priemer vodiča (`average_rating`).
> 4. Ak priemer vodiča klesne pod 4.2 po viac ako 20 jazdách, pošli automatické varovanie alebo zmeň stav účtu na `suspended`."

---

### Prompt 12: Zárobky Vodiča (Earnings) a Výplaty
**Cieľ:** Transparentnosť pre vodiča o tom, koľko zarobil.

> **PROMPT 12:**
> "Pôsob ako Fintech Developer. Vodiči potrebujú detailný prehľad svojich financií.
>
> Úlohy:
> 1. Vytvor Flutter obrazovku 'Zárobky' (Earnings Dashboard) pre vodičov.
> 2. Použi pekné grafy (napríklad balík `fl_chart`), ktoré zobrazia zárobky za dnešok, tento týždeň a tento mesiac.
> 3. Implementuj rozpad sumy pre konkrétnu jazdu: Celková suma zaplatená zákazníkom, poplatok aplikácie (napr. 15%) a čistý zárobok vodiča.
> 4. Ak používame Stripe Connect, priprav logiku (UI aj Supabase Edge Function) na manuálne alebo automatické vyžiadanie výplaty ('Payout') na bankový účet vodiča."

