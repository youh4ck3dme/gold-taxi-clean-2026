### Prompt 6: Pokročilé Vyhľadávanie Adries a Google Places
**Cieľ:** Dokonalý UX pri zadávaní cieľovej a štartovacej adresy.

> **PROMPT 6:**
> "Pôsob ako UX & Location Specialist. Naša aplikácia potrebuje inteligentné vyhľadávanie adries rovnako ako Bolt, kde používateľ zadáva cieľ jazdy.
>
> Úlohy:
> 1. Integruj Google Places API (alebo Mapbox Search).
> 2. Vytvor obrazovku/BottomSheet pre vyhľadávanie s `TextField`, ktorý bude pomocou 'debounce' (oneskorenia) volať Places API a zobrazovať našepkávač (Autocomplete).
> 3. Implementuj Reverse Geocoding: Ak používateľ posunie špendlík na mape, prelož súradnice na textovú adresu (napr. 'Hlavná 25, Košice').
> 4. Vytvor lokálnu databázu (cez Hive alebo SharedPreferences) pre 'Nedávne miesta' (Recent searches) a možnosť uložiť si 'Domov' a 'Práca' pre rýchly výber."

---

### Prompt 7: Mapové Animácie a Rotácia Vozidiel
**Cieľ:** Aby pohyb autíčok na mape nepôsobil trhavo a neprirodzene.

> **PROMPT 7:**
> "Pôsob ako Flutter Animations Expert. Keď vodič posiela svoju polohu (napríklad každé 3 sekundy), jeho marker na mape u zákazníka 'skáče'. Potrebujeme to vyhladiť.
>
> Úlohy:
> 1. Vytvor custom Google Maps `Marker`, ktorý používa obrázok auta (asset).
> 2. Implementuj lineárnu interpoláciu (Tween animation): Keď príde nová súradnica zo Supabase Realtime, marker sa nepresunie okamžite, ale plynule 'prejde' z bodu A do bodu B za daný čas.
> 3. Vypočítaj uhol natočenia vozidla (Bearing/Heading) na základe predchádzajúcej a novej súradnice a plynule otoč ikonu autíčka v smere jazdy.
> 4. Aplikuj 'Camera Auto-Tracking' – ak je používateľ v stave jazdy, kamera môže voliteľne plynule sledovať auto."

---

### Prompt 8: In-App Chat a Maskované Telefonáty
**Cieľ:** Komunikácia medzi vodičom a zákazníkom bez prezradenia osobných telefónnych čísel.

> **PROMPT 8:**
> "Pôsob ako Communication Systems Architect. Potrebujeme spojiť vodiča a zákazníka, keď je jazda prijatá.
>
> Úlohy:
> 1. Vytvor Supabase tabuľku `messages` (s RLS), ktorá bude prepojená s `ride_id`.
> 2. Implementuj In-App chat vo Flutteri pomocou Supabase Realtime, kde si vodič a zákazník môžu písať (s bublinkovým UI a časovými pečiatkami).
> 3. Pridaj preddefinované rýchle odpovede (Quick Replies) ako 'Som tu', 'Meškám 2 minúty' atď.
> 4. (Pokročilé) Pre telefonáty: Na implementuj preklik na volanie, ale ideálne cez integráciu Twilio Masked Calling, aby ani jedna strana nevidela reálne číslo tej druhej (prípadne vytvor aspoň placeholder pre túto funkcionalitu)."

