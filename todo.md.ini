### Prompt 13: Promo Kódy a Referenčný Systém
**Cieľ:** Marketingový nástroj na akvizíciu nových používateľov.

> **PROMPT 13:**
> "Pôsob ako Growth Hacker & Backend Engineer. Potrebujeme nástroje na virálne šírenie aplikácie.
>
> Úlohy:
> 1. Vytvor tabuľky `promo_codes` (kód, zľava v %, alebo fixná suma, platnosť do) a `user_promos` (kto aký kód už využil).
> 2. Do Checkout/Objednávkového UI pridaj tlačidlo 'Zadať promo kód'. Aplikácia musí asynchrónne overiť jeho platnosť a okamžite prepočítať výslednú cenu.
> 3. Vytvor Referenčný systém: Každý používateľ má svoj unikátny kód (napr. 'JOZO50'). Ak sa nový zákazník zaregistruje s týmto kódom, obaja dostanú zľavu na ďalšiu jazdu.
> 4. Zdieľanie kódu implementuj cez balík `share_plus` vo Flutteri (native share dialog s pripraveným textom)."

