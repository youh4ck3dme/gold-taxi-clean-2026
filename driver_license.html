<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodičský Preukaz - Slovenská Republika</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #2c3e50;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    margin: 0;
  }
  .card {
    width: 856px;
    height: 540px;
    background: linear-gradient(135deg, #ffd1dc 0%, #e3f2fd 40%, #fff 50%, #e3f2fd 60%, #ffd1dc 100%);
    border-radius: 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    position: relative;
    padding: 40px;
    box-sizing: border-box;
    overflow: hidden;
  }
  /* Security pattern background overlay */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 2px, transparent 2px, transparent 10px),
                      repeating-linear-gradient(-45deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 2px, transparent 2px, transparent 10px);
    z-index: 0;
    pointer-events: none;
  }
  
  .eu-flag {
    position: absolute;
    top: 30px;
    left: 40px;
    width: 120px;
    height: 80px;
    background-color: #003399;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    position: relative;
    float: left;
  }
  
  /* EU Flag text */
  .eu-flag::after {
    content: "SK";
    color: white;
    font-weight: bold;
    font-size: 36px;
    position: absolute;
  }
  /* Pseudo-element for stars */
  .eu-stars {
    width: 60px;
    height: 60px;
    border: 2px dotted #ffd700;
    border-radius: 50%;
    position: absolute;
  }

  .header {
    margin-left: 150px;
    margin-top: 0px;
    z-index: 1;
    position: relative;
  }
  .title-sk {
    color: #003399;
    font-size: 34px;
    font-weight: 800;
    margin: 0;
    line-height: 1;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle {
    color: #444;
    font-size: 18px;
    margin-top: 4px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .content {
    margin-top: 30px;
    display: flex;
    position: relative;
    z-index: 1;
  }
  .photo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .photo {
    width: 180px;
    height: 230px;
    background-color: rgba(255,255,255,0.6);
    border-radius: 10px;
    margin-right: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #999;
    font-size: 20px;
    border: 2px dashed #bbb;
    backdrop-filter: blur(5px);
  }
  .signature {
    margin-top: 20px;
    font-family: 'Brush Script MT', cursive;
    font-size: 32px;
    color: #333;
    transform: rotate(-5deg);
  }
  .fields {
    flex-grow: 1;
    font-size: 22px;
    line-height: 1.5;
  }
  .field {
    display: flex;
    margin-bottom: 8px;
    align-items: baseline;
  }
  .field-num {
    color: #003399;
    font-weight: 700;
    margin-right: 10px;
    font-size: 16px;
    width: 30px;
    text-align: right;
  }
  .field-val {
    font-weight: 600;
    color: #222;
  }
  .flex-row {
    display: flex;
    gap: 40px;
  }
  .categories {
    margin-top: 15px;
    display: flex;
    align-items: center;
  }
  .cat-box {
    border: 2px solid #555;
    padding: 4px 10px;
    margin-right: 6px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(255,255,255,0.6);
    border-radius: 4px;
    color: #333;
  }
  .mrz {
    position: absolute;
    bottom: 30px;
    left: 40px;
    right: 40px;
    font-family: 'OCR-B', 'Courier New', Courier, monospace;
    font-size: 32px;
    letter-spacing: 4px;
    font-weight: bold;
    color: #111;
    z-index: 1;
  }
  .crest {
    position: absolute;
    right: 30px;
    top: 20px;
    width: 100px;
    height: 120px;
    opacity: 0.15;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><path fill="%23003399" d="M10,10 L90,10 L90,70 C90,100 50,110 50,110 C50,110 10,100 10,70 Z"/></svg>') no-repeat center;
    background-size: contain;
    z-index: 0;
  }
  .watermark-leaf {
    position: absolute;
    opacity: 0.4;
    width: 40px;
    height: 40px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23b8860b" d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>') no-repeat center;
    background-size: contain;
    z-index: 0;
  }
  .leaf1 { bottom: 120px; left: 180px; transform: scale(1.5); }
  .leaf2 { bottom: 180px; right: 100px; transform: scale(2) rotate(45deg); }
</style>
</head>
<body>

<div class="card">
  <div class="crest"></div>
  <div class="watermark-leaf leaf1"></div>
  <div class="watermark-leaf leaf2"></div>
  
  <div class="eu-flag">
    <div class="eu-stars"></div>
  </div>
  
  <div class="header">
    <div class="title-sk">VODIČSKÝ PREUKAZ</div>
    <div class="subtitle">SLOVENSKÁ REPUBLIKA</div>
  </div>
  
  <div class="content">
    <div class="photo-container">
       <div class="photo">FOTO</div>
       <div style="display:flex; align-items: center; margin-top: 15px; width: 100%; justify-content: center;">
         <span class="field-num" style="margin:0; padding-right:5px; text-align:left; width:auto;">7.</span>
         <div class="signature">Kražeľ</div>
       </div>
    </div>
    
    <div class="fields">
      <div class="field"><span class="field-num">1.</span><span class="field-val">Kražeľ</span></div>
      <div class="field"><span class="field-num">2.</span><span class="field-val">Zdenko</span></div>
      <div class="field"><span class="field-num">3.</span><span class="field-val">16.07.1986 Košice</span></div>
      <div class="flex-row">
        <div class="field"><span class="field-num">4a.</span><span class="field-val">08.04.2019</span></div>
        <div class="field"><span class="field-num">4b.</span><span class="field-val">08.04.2034</span></div>
      </div>
      <div class="field"><span class="field-num">4c.</span><span class="field-val">OR PZ v Košiciach</span></div>
      <div class="field"><span class="field-num">5.</span><span class="field-val" style="font-size:26px;">N5748585</span></div>
      
      <div class="categories">
        <span class="field-num">9.</span>
        <div class="cat-box">AM</div>
        <div class="cat-box">A1</div>
        <div class="cat-box">A2</div>
        <div class="cat-box">A</div>
        <div class="cat-box">B1</div>
        <div class="cat-box">B</div>
      </div>
    </div>
  </div>

  <div class="mrz">DLSVKN5748585&lt;6860716904340863</div>
</div>

</body>
</html>
