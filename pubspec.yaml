name: gold_taxi
description: "Gold-Taxi Flutter App - Mobile application for WordPress JetEngine."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5
  provider: ^6.1.5+1

  # Supabase
  supabase_flutter: ^2.12.4

  # Dependency Injection
  get_it: ^7.5.0

  # HTTP Client
  dio: ^5.3.1
  retrofit: ^4.0.0
  json_annotation: ^4.8.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2



  # Security
  flutter_secure_storage: ^9.2.2

  # Image & Media
  cached_network_image: ^3.3.0
  flutter_html: ^3.0.0-alpha.6
  image_picker: ^1.0.7
  video_player: ^2.8.1

  # Location & Maps
  google_maps_flutter: ^2.10.0
  google_maps_cluster_manager_2: ^3.2.0
  flutter_map: ^8.2.2
  flutter_map_marker_cluster: ^8.2.2
  flutter_map_marker_popup: ^8.1.0
  latlong2: ^0.9.1
  geolocator: ^9.0.2
  geocoding: ^4.0.0

  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.0.9

  # Navigation & Deep Linking
  go_router: ^14.2.0
  app_links: ^7.1.2

  # Utilities
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.1.1
  url_launcher: ^6.1.14
  share_plus: ^10.1.3
  permission_handler: ^11.4.0
  rxdart: ^0.28.0

  # UI/UX
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  badges: ^3.1.1
  fl_chart: ^0.65.0

  # Logging
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  json_serializable: ^6.7.0
  build_runner: ^2.4.6
  bloc_test: ^10.0.0
  mockito: ^5.4.4

  # Analysis & Testing
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3
  path: ^1.9.0

  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#000000"
    theme_color: "#C9A84C"
  windows:
    generate: false
  macos:
    generate: false
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

