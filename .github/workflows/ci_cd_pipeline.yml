name: Flutter CI/CD Pipeline & Diagnostics

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create Dummy Env File
        run: |
          echo "SUPABASE_URL=https://dummy.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=dummykey_longer_than_10_chars" >> .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: any
          channel: 'stable'

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Install Dependencies
        run: flutter pub get

      - name: Code Generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Static Analysis
        run: flutter analyze

      - name: Run Unit & Widget Tests
        run: flutter test --dart-define-from-file=.env --machine > test-results.json

      - name: Run Integration Tests (Headless)
        run: xvfb-run -a flutter test -d linux integration_test/app_integration_test.dart --dart-define-from-file=.env
