- **API a Webhooks**:
  - **Vlastné REST API endpointy** (pre Flutter plugin):
    - `POST /wp-json/jetevent/v1/diagnose` – spustenie diagnostiky
    - `GET /wp-json/jetevent/v1/reports` – zoznam reportov
    - `GET /wp-json/jetevent/v1/report/{id}` – detail reportu
    - `POST /wp-json/jetevent/v1/report/{id}/comment` – pridanie komentára
  - **Webhooky**:
    - Webhook pre nový report (odoslaný na Zapier/Make)
    - Webhook pre novú kritickú anomáliu (odoslaný na Slack/Discord)

- **Flutter plugin (integracia s WordPress)**:
  - **Funkcie**:
    - Spustenie diagnostiky z aplikácie
    - Nahratie reportu na WordPress
    - Získanie odporúčaní z WordPress
    - Automatické sledovanie chýb (integrované s Sentry/Crashlytics)
  - **Technológia**:
    - HTTP klient (Dio alebo http package)
    - JSON serializácia (json_serializable)
    - Lokálne úložisko (shared_preferences)
  - **Príklad kódu (spustenie diagnostiky)**:
    ```dart
    Future<void> runDiagnostic() async {
      final response = await http.post(
        Uri.parse('https://{domain}/wp-json/jetevent/v1/diagnose'),
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ${await _getApiKey()}',
        },
        body: jsonEncode({
          'app_version': '1.2.3',
          'device_info': {
            'device_model': 'iPhone 13',
            'os_version': '15.4',
            'screen_resolution': '1170x2532',
            'locale': 'sk_SK',
          },
          'metrics': {
            'cpu_usage': 45.2,
            'memory_usage': 120.5,
            'network_latency': 120,
          },
          'anomalies': [
            {
              'type': 'performance',
              'subtype': 'slow_rendering',
              'severity': 'medium',
              'description': 'Frame rendering time exceeded 16ms threshold',
              'suggested_fix': 'Optimize widget rebuilds',
            },
          ],
        }),
      );
      if (response.statusCode == 200) {
        final reportId = jsonDecode(response.body)['report_id'];
        // Uložiť reportId pre neskoršie načítanie
      } else {
        throw Exception('Failed to run diagnostic');
      }
    }
    ```

