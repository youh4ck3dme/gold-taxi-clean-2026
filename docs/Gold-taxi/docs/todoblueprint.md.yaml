#### 3.3. JetEngine prvky
- **Dynamic Fields**:
  - `severity_score` (Výpočtové pole v `diagnostic_report`):
    ```php
    // Výpočet na základe anomálií
    $anomalies = get_posts([
      'post_type' => 'anomaly',
      'meta_query' => [
        ['key' => 'report_id', 'value' => get_the_ID(), 'compare' => '=']
      ]
    ]);
    $score = 0;
    foreach ($anomalies as $anomaly) {
      $severity = get_field('severity', $anomaly->ID);
      $score += match($severity) {
        'low' => 5,
        'medium' => 15,
        'high' => 30,
        'critical' => 50,
        default => 0
      };
    }
    return min(100, $score);
    ```
  - `performance_score` (Výpočtové pole):
    ```php
    // Vážený priemer metrik
    $metrics = get_posts([
      'post_type' => 'performance_metric',
      'meta_query' => [
        ['key' => 'report_id', 'value' => get_the_ID(), 'compare' => '=']
      ]
    ]);
    $total = 0;
    $weight = 0;
    foreach ($metrics as $metric) {
      $value = get_field('value', $metric->ID);
      $threshold = get_field('threshold', $metric->ID);
      $score = ($threshold && $value > $threshold) ? 0 : 100;
      $total += $score;
      $weight += 100;
    }
    return $weight > 0 ? round($total / ($weight / 100)) : 100;
    ```

- **Relationships**:
  - **Prepojenia**:
    - `diagnostic_report` → `anomaly` (One-to-Many)
    - `anomaly` → `recommendation` (One-to-Many)
    - `diagnostic_report` → `performance_metric` (One-to-Many)
    - `diagnostic_report` → `ui_ux_issue` (One-to-Many)
  - **Vlastné relationship polia**:
    - V `diagnostic_report` CPT: pole `related_anomalies` (pre zobrazenie v admini)
    - V `anomaly` CPT: pole `related_recommendations` (pre zobrazenie v admini)

- **Query Builder**:
  - **Zoznam reportov** (`/reports`):
    - Filtrovanie podľa:
      - Dátumu (od-do)
      - Statusu (pending, completed, atď.)
      - Severity skóre (rozsah)
      - Typu anomálií (performance, security, atď.)
      - Zariadenia (device_model)
    - Sortovanie: najnovšie, najvyššie skóre, najkritickejšie
  - **Zoznam anomálií** (`/anomalies`):
    - Filtrovanie podľa:
      - Typu a podtypu
      - Severity
      - Reportu
      - Zariadenia
    - Sortovanie: najkritickejšie, najnovšie
  - **Zoznam odporúčaní** (`/recommendations`):
    - Filtrovanie podľa:
      - Priority
      - Statusu
      - Typu problému
    - Sortovanie: priorita, odhadovaný čas

- **Dynamic Views**:
  - **Dashboard widget pre reporty**:
    - Zobrazenie posledných 5 reportov s ikonami stavu
    - Graf celkového skóre rizika
  - **Karta anomálie**:
    - Zobrazenie detailov anomálie s odkazom na report
  - **Karta odporúčania**:
    - Zobrazenie akčného kroku s odkazom na anomáliu

- **Calculated Fields**:
  - `time_to_fix` (v `recommendation` CPT):
    ```php
    // Odhadovaný čas na opravu na základe priority a náročnosti
    $priority = get_field('priority');
    $difficulty = get_field('implementation_difficulty');
    return match($priority) {
      'critical' => match($difficulty) { 'easy' => 1, 'medium' => 2, 'hard' => 4 },
      'high' => match($difficulty) { 'easy' => 2, 'medium' => 4, 'hard' => 8 },
      'medium' => match($difficulty) { 'easy' => 4, 'medium' => 8, 'hard' => 16 },
      'low' => match($difficulty) { 'easy' => 8, 'medium' => 16, 'hard' => 32 },
      default => 0
    };
    ```

- **User Roles & Capabilities**:
  - **Roles**:
    - `admin` – plný prístup
    - `developer` – prístup k reportom, anomáliám, odporúčaniam
    - `viewer` – iba prehľad reportov (žiadne úpravy)
  - **Capabilities**:
    - `edit_diagnostic_report`, `delete_diagnostic_report`
    - `edit_anomaly`, `delete_anomaly`
    - `edit_recommendation`, `delete_recommendation`
    - `export_reports` (špeciálna capability pre export)

