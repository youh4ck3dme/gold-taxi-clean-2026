#### 3.2. Custom Post Types (CPT) a Taxonómie
- **CPT: `diagnostic_report`**
  - **Pole (ACF)**:
    - `app_version` (Text, required)
    - `device_info` (WYSIWYG, JSON formát)
    - `scan_timestamp` (Date, required)
    - `completion_timestamp` (Date)
    - `severity_score` (Number, min 0, max 100)
    - `performance_score` (Number)
    - `security_score` (Number)
    - `compatibility_score` (Number)
    - `notes` (WYSIWYG)
    - `tags` (Taxonómia: `report_tags`)
    - `user_id` (User Reference, kto report vytvoril)
  - **Taxonómia**: `report_status` (pending, in_progress, completed, failed, cancelled)
  - **Permalink**: `/report/{id}`
  - **Archive**: `/reports`

- **CPT: `anomaly`**
  - **Pole (ACF)**:
    - `type` (Select: performance, security, compatibility, ui_ux, localization, required)
    - `subtype` (Text)
    - `severity` (Select: low, medium, high, critical, required)
    - `description` (WYSIWYG, required)
    - `suggested_fix` (WYSIWYG)
    - `affected_component` (Text)
    - `stack_trace` (Textarea)
    - `screenshot_url` (URL)
    - `device_model` (Text)
    - `os_version` (Text)
    - `timestamp` (DateTime)
  - **Taxonómia**: `anomaly_type` (podľa `type`)
  - **Relationships**:
    - `Belongs to` → `diagnostic_report`
    - `Has many` → `recommendations`

- **CPT: `recommendation`**
  - **Pole (ACF)**:
    - `action` (WYSIWYG, required)
    - `priority` (Select: low, medium, high, critical, required)
    - `estimated_cost` (Number, min 0)
    - `estimated_time` (Number, min 0)
    - `implementation_difficulty` (Select: easy, medium, hard)
    - `related_issue_url` (URL)
    - `status` (Select: pending, in_progress, completed, rejected, required)
  - **Relationships**:
    - `Belongs to` → `anomaly`
  - **Permalink**: `/recommendation/{id}`

- **CPT: `performance_metric`**
  - **Pole (ACF)**:
    - `metric_type` (Select: cpu_usage, memory_usage, gpu_usage, network_latency, battery_usage, required)
    - `value` (Number, required)
    - `threshold` (Number)
    - `unit` (Text, required)
    - `timestamp` (DateTime, required)
  - **Relationships**:
    - `Belongs to` → `diagnostic_report`

- **CPT: `ui_ux_issue`**
  - **Pole (ACF)**:
    - `issue_type` (Select: tap_target_size, contrast_ratio, font_size, layout_shift, required)
    - `severity` (Select: low, medium, high, required)
    - `screenshot_url` (URL)
    - `description` (WYSIWYG, required)
    - `suggested_fix` (WYSIWYG)
  - **Relationships**:
    - `Belongs to` → `diagnostic_report`

- **CPT: `article`** (pre blog)
  - **Pole (ACF)**:
    - `excerpt` (Textarea)
    - `featured_image` (Image)
    - `categories` (Taxonómia: `article_category`)
    - `related_reports` (Relationship → `diagnostic_report`)
  - **Taxonómia**: `article_category` (výkon, bezpečnosť, kompatibilita, atď.)

- **Taxonómie**:
  - `report_tags` (pre tagovanie reportov)
    - **Pole**: `color` (pre zobrazenie tagov v rôznych farbách)
  - `anomaly_type` (podtypy anomálií)
  - `article_category` (kategórie blogových článkov)

