### 5. Bezpečnosť
- **Ochrana dát**:
  - **GDPR compliance**:
    - Súhlas s spracovaním údajov (checkbox pri registrácii)
    - Právo na výmaz údajov (formulár na stránke)
    - Zoznam spracúvaných údajov (v GDPR sekcii)
    - Export údajov používateľa (na požiadanie)
  - **Šifrovanie**:
    - Citlivé údaje (napr. API klúče) šifrované pomocou `wp_salt` a `openssl_encrypt`
    - Heslá používateľov hashované (bcrypt)
  - **Audit logy**:
    - Zápis zmien v systéme (kto, kedy, čo zmenil)
    - Plugin: WP Security Audit Log

- **Autentifikácia a autorizácia**:
  - **Prihlásenie**:
    - Dvojfaktorová autentifikácia (2FA) pomocou pluginu (napr. Google Authenticator)
    - Omezenie pokusov o prihlásenie (5 pokusov, následne lock)
  - **API bezpečnosť**:
    - OAuth 2.0 pre externé API volania
    - Rate limiting (max 100 requestov/hodinu na IP)
    - API klúče sa generujú automaticky pre používateľov
    - Endpointy:
      - `/wp-json/jetevent/v1/diagnose` (spustenie diagnostiky)
      - `/wp-json/jetevent/v1/reports` (získanie reportov)
      - `/wp-json/jetevent/v1/recommendations` (získanie odporúčaní)

- **Ochrana pred útokmi**:
  - **Web Application Firewall (WAF)**:
    - Cloudflare WAF alebo Wordfence
  - **Ochrana proti CSRF**:
    - Nonce pre všetky formuláre a API volania
  - **Ochrana proti XSS a SQL Injection**:
    - WordPress core funkcie (escaping, prepared statements)
    - Plugin: Wordfence alebo iThemes Security

- **Zálohovanie**:
  - Automatické zálohovanie (UpdraftPlus alebo BlogVault)
  - Zálohy uložené na externom úložisku (Google Drive, Dropbox)
  - Denné zálohy + týždenné archivácie

