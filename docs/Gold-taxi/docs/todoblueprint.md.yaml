Vylepšený Diagnostický systém pre Flutter aplikáciu
## Architektúra blueprintu

---

### 1. Hlavné komponenty systému
- **Diagnostický modul**
  - **Účel**: Komplexné skenovanie, detekcia anomálií a generovanie reportov
  - **Funkcie**:
    - Automatizované testovanie výkonu (CPU, RAM, GPU)
    - Kontrola kompatibility s rôznymi zariadeniami (iOS, Android, rôzne verzie OS)
    - Detekcia chýb (crashes, memory leaks, network issues)
    - Analýza bezpečnostných rizík (zraniteľnosti, nešifrovaná komunikácia)
    - Monitorovanie sieťovej latency, stability a spotreby dát
    - Podpora viacerých Flutter verzií a pluginov
    - **Nové funkcie**:
      - Skenovanie UI/UX problémov (napr. nedostupné prvky)
      - Kontrola lokalizačných chýb
      - Analýza APK/IPA veľkosti a optimalizácia

- **Reportovací systém**
  - **Účel**: Generovanie detailných, akcionovatel'ných reportov
  - **Funkcie**:
    - Export reportov do formátov (PDF, JSON, CSV, HTML)
    - Vizualizácia dát (interaktívne grafy, heatmapy, timeline)
    - Prioritizácia nájdených problémov (automatické skóre rizika)
    - Automatické odosielanie reportov (e-mail, Slack, Teams, webhook)
    - **Nové funkcie**:
      - Porovnanie reportov medzi jednotlivými skenmi
      - Generovanie "diff" reportov (zmeny od posledného skenu)
      - Možnosť pridania vlastných značiek (tags) k anomáliám

- **Návrhový modul**
  - **Účel**: Generovanie optimalizačných krokov a akčných plánov
  - **Funkcie**:
    - Návrhy na zlepšenie výkonu (kód, assets, sieť)
    - Odporúčania pre údržbu kódu (refactoring, dependency updates)
    - Plán údržby a aktualizácií (rozvrh, náklady)
    - Odhad nákladov na opravy (časové, finančné)
    - **Nové funkcie**:
      - Automatické generovanie PR (Pull Request) šablón pre GitHub/GitLab
      - Integrovaný task manager pre sledovanie oprav
      - Odhad dopadu zmien na UX/UI

