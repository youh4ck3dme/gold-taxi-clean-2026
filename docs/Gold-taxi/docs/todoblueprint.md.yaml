### 2. Databázová architektúra (WordPress JetEngine)
#### 2.1. Tabuľky a ich vztahy
- **`diagnostic_reports`**
  - `id` (INT, PK, AUTO_INCREMENT)
  - `app_version` (VARCHAR(20), NOT NULL) – verzia Flutter aplikácie
  - `device_info` (JSON) – detailné informácie o zariadení
    - `device_model`, `os_version`, `sdk_version`, `screen_resolution`, `locale`, `timezone`
  - `scan_timestamp` (DATETIME, NOT NULL) – čas spustenia skenu
  - `completion_timestamp` (DATETIME) – čas ukončenia skenu
  - `status` (ENUM: 'pending', 'in_progress', 'completed', 'failed', 'cancelled') – stav reportu
  - `severity_score` (FLOAT, DEFAULT 0) – celkové skóre rizika (0-100)
  - `performance_score` (FLOAT) – skóre výkonu
  - `security_score` (FLOAT) – skóre bezpečnosti
  - `compatibility_score` (FLOAT) – skóre kompatibility
  - `notes` (TEXT) – dodatočné poznámky od používateľa
  - `tags` (JSON) – pole tagov pre kategorizáciu

- **`anomalies`**
  - `id` (INT, PK, AUTO_INCREMENT)
  - `report_id` (INT, FK → `diagnostic_reports.id`, ON DELETE CASCADE)
  - `type` (ENUM: 'performance', 'security', 'compatibility', 'ui_ux', 'localization') – typ anomálie
  - `subtype` (VARCHAR(50)) – podtyp (napr. 'memory_leak', 'crash', 'slow_rendering')
  - `description` (TEXT, NOT NULL) – detailný popis problému
  - `severity` (ENUM: 'low', 'medium', 'high', 'critical') – závažnosť
  - `suggested_fix` (TEXT) – navrhované riešenie
  - `affected_component` (VARCHAR(100)) – komponent, ktorý je postihnutý
  - `stack_trace` (TEXT) – chybová stopa (ak sa týka chyby)
  - `screenshot_url` (VARCHAR(255)) – URL k screenshotu (ak je relevantné)
  - `device_model` (VARCHAR(100)) – model zariadenia, kde sa problém vyskytol
  - `os_version` (VARCHAR(20)) – verzia OS
  - `timestamp` (DATETIME) – čas výskytu anomálie

- **`recommendations`**
  - `id` (INT, PK, AUTO_INCREMENT)
  - `anomaly_id` (INT, FK → `anomalies.id`, ON DELETE CASCADE)
  - `action` (TEXT, NOT NULL) – konkrétny krok na opravu
  - `priority` (ENUM: 'low', 'medium', 'high', 'critical') – priorita riešenia
  - `estimated_cost` (DECIMAL(10,2)) – odhadovaný náklad (v hodinách)
  - `estimated_time` (INT) – odhadovaný čas riešenia (v hodinách)
  - `implementation_difficulty` (ENUM: 'easy', 'medium', 'hard') – náročnosť
  - `related_issue_url` (VARCHAR(255)) – odkaz na GitHub issue/PR
  - `status` (ENUM: 'pending', 'in_progress', 'completed', 'rejected') – stav odporúčania

- **`devices`**
  - `id` (INT, PK, AUTO_INCREMENT)
  - `device_model` (VARCHAR(100), NOT NULL) – model zariadenia
  - `manufacturer` (VARCHAR(50)) – výrobca (Apple, Samsung, Xiaomi, atď.)
  - `os` (ENUM: 'android', 'ios') – operačný systém
  - `os_version` (VARCHAR(20)) – verzia OS
  - `screen_resolution` (VARCHAR(20)) – rozlíšenie obrazovky
  - `screen_density` (FLOAT) – pixel density (DPI)
  - `architecture` (VARCHAR(20)) – CPU architektúra (arm64, x86)
  - `is_emulator` (BOOLEAN, DEFAULT FALSE) – či ide o emulátor

- **`performance_metrics`** (nový)
  - `id` (INT, PK, AUTO_INCREMENT)
  - `report_id` (INT, FK → `diagnostic_reports.id`, ON DELETE CASCADE)
  - `metric_type` (ENUM: 'cpu_usage', 'memory_usage', 'gpu_usage', 'network_latency', 'battery_usage') – typ metriky
  - `value` (FLOAT) – hodnota metriky
  - `threshold` (FLOAT) – prahová hodnota
  - `unit` (VARCHAR(10)) – jednotka (%, MB, ms, atď.)
  - `timestamp` (DATETIME) – čas merania

- **`ui_ux_issues`** (nový)
  - `id` (INT, PK, AUTO_INCREMENT)
  - `report_id` (INT, FK → `diagnostic_reports.id`, ON DELETE CASCADE)
  - `issue_type` (ENUM: 'tap_target_size', 'contrast_ratio', 'font_size', 'layout_shift') – typ UI/UX problému
  - `severity` (ENUM: 'low', 'medium', 'high') – závažnosť
  - `screenshot_url` (VARCHAR(255)) – URL k screenshotu
  - `description` (TEXT) – popis problému
  - `suggested_fix` (TEXT) – navrhované riešenie

- **`users`** (nový, pre sledovanie používateľov)
  - `id` (INT, PK, AUTO_INCREMENT)
  - `user_email` (VARCHAR(100), UNIQUE)
  - `user_role` (ENUM: 'admin', 'developer', 'viewer') – rola používateľa
  - `last_login` (DATETIME)
  - `api_key` (VARCHAR(64)) – API klúč pre externé integrácie

#### 2.2. Relácie
- **One-to-Many**:
  - `diagnostic_reports` → `anomalies`
  - `diagnostic_reports` → `performance_metrics`
  - `diagnostic_reports` → `ui_ux_issues`
  - `anomalies` → `recommendations`
- **Many-to-One**:
  - `anomalies` → `devices` (prostredníctvom `device_model` a `os_version` v `anomalies`)
  - `diagnostic_reports` → `users` (prostredníctvom `user_id` v `diagnostic_reports`)
- **Many-to-Many**:
  - `diagnostic_reports` ↔ `tags` (prostredníctvom pomocnej tabuľky `report_tags`)

